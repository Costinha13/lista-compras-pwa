<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#007AFF">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Compras">
  <link rel="apple-touch-icon" href="icon-512.png">
  
  <title>Lista de Compras</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">
    <h1>🛒 Lista de Compras</h1>

    <div id="userBox">
      <input id="userName" placeholder="O teu nome" />
      <button id="saveBtn">Guardar</button>
    </div>

    <div id="main" class="hidden">

      <p id="hello"></p>

      <div id="formContainer">

  <div id="rows"></div>


  <button id="addAllBtn">Adicionar à lista</button>

</div>

    

      <hr/>

      <!-- FILTROS (CORRIGIDO - dentro do body e dentro do main) -->
      <div class="filters">
        <button id="f_all">Todos</button>
        <button id="f_todo">Por comprar</button>
        <button id="f_done">Comprados</button>
      </div>

      <div id="lista"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
